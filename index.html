<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-Presensi RRI Manado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .header-soft-gradient {
            background: linear-gradient(to bottom, #eff6ff 0%, #ffffff 100%);
            border-bottom: 1px solid #dbeafe;
        }

        .glass-header {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            overflow: hidden;
            background: #0f172a;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .captured-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .status-card {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="radio"]:checked + .status-card {
            border-color: #3b82f6;
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.15);
        }

        input[type="radio"]:checked + .status-card .icon-box {
            background-color: #3b82f6;
            color: white;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-gradient:active { transform: scale(0.96); }

        .history-card { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-slate-900 antialiased overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative pb-10">
        <!-- Header -->
        <header class="header-soft-gradient glass-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 flex items-center justify-center overflow-hidden bg-white rounded-xl shadow-sm border border-blue-50">
                    <img src="https://lh3.googleusercontent.com/u/0/d/1UxSp_9U6A4wiDz-GarFhM31m3Ynrmdus" 
                         alt="Logo RRI" 
                         class="w-full h-full object-contain p-1"
                         onerror="this.src='https://via.placeholder.com/48?text=RRI'">
                </div>
                <div>
                    <h1 class="text-lg font-extrabold text-blue-900 leading-none tracking-tight">e-Presensi</h1>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.15em] mt-1.5">RRI Manado</p>
                </div>
            </div>
            <button onclick="openLoginModal()" class="p-2 bg-white rounded-full border border-blue-100 shadow-sm text-blue-600 hover:bg-blue-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                </svg>
            </button>
        </header>

        <!-- Main Presence View -->
        <main id="mainView" class="px-6 py-6 space-y-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Data Pegawai</label>
                    <input type="text" id="nameInput" placeholder="Masukkan Nama Lengkap" 
                           class="w-full bg-white px-5 py-4 rounded-2xl border border-slate-200 focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all outline-none text-base font-semibold">
                </div>

                <div class="space-y-3">
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Pilih Status</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative">
                            <input type="radio" name="attendanceStatus" value="Masuk" class="hidden peer" checked>
                            <div class="status-card h-full border border-slate-200 bg-white rounded-2xl p-4 flex flex-col items-center gap-3 text-center">
                                <div class="icon-box w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                                    </svg>
                                </div>
                                <span class="text-sm font-bold text-slate-600 tracking-tight text-uppercase">MASUK</span>
                            </div>
                        </label>
                        <label class="relative">
                            <input type="radio" name="attendanceStatus" value="Pulang" class="hidden peer">
                            <div class="status-card h-full border border-slate-200 bg-white rounded-2xl p-4 flex flex-col items-center gap-3 text-center">
                                <div class="icon-box w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                    </svg>
                                </div>
                                <span class="text-sm font-bold text-slate-600 tracking-tight text-uppercase">PULANG</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest ml-1">Verifikasi Wajah</label>
                    <div class="video-wrapper">
                        <video id="video" autoplay playsinline muted></video>
                        <img id="photoPreview" class="captured-photo">
                        <div id="captureContainer" class="absolute bottom-4 left-0 right-0 flex justify-center">
                            <button onclick="takeSnapshot()" class="bg-white/20 backdrop-blur-md p-1 rounded-full border border-white/30">
                                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                                    <div class="w-12 h-12 border-2 border-blue-900 rounded-full"></div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <button id="retakeBtn" onclick="retakePhoto()" class="hidden w-full py-3 text-sm font-bold text-blue-600 bg-blue-50 rounded-xl">Ambil Ulang Foto</button>
                </div>

                <button id="submitBtn" onclick="submitAbsence()" class="btn-gradient w-full py-5 rounded-2xl text-white font-extrabold text-lg flex items-center justify-center">
                    <span id="btnText">KIRIM PRESENSI</span>
                    <div id="btnLoading" class="hidden flex items-center gap-3">
                        <div class="spinner"></div>
                        <span>MENGIRIM...</span>
                    </div>
                </button>
            </div>

            <div class="pt-4 space-y-4">
                <div class="flex justify-between items-end">
                    <div>
                        <h2 class="text-lg font-extrabold text-slate-800">Riwayat Terkini</h2>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Hanya menampilkan 5 data terakhir</p>
                    </div>
                </div>
                <div id="historyContainer" class="space-y-3"></div>
            </div>
        </main>

        <!-- Admin Dashboard View -->
        <main id="adminView" class="hidden px-6 py-6 space-y-8 animate-fade-in">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Panel Admin</h2>
                <button onclick="closeAdmin()" class="text-sm font-bold text-slate-400 px-3 py-1.5 bg-slate-100 rounded-lg">Keluar</button>
            </div>

            <!-- Map Settings Section -->
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                <div class="flex items-center gap-3 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <h3 class="font-extrabold text-slate-800">Pengaturan Lokasi (Map)</h3>
                </div>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Latitude</label>
                            <input type="text" id="latInput" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 text-sm" value="1.4748">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Longitude</label>
                            <input type="text" id="lngInput" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 text-sm" value="124.8413">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Radius Presensi (Meter)</label>
                        <input type="number" id="radiusInput" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 text-sm" value="100">
                    </div>
                    <button onclick="saveMapConfig()" class="w-full py-3 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-md shadow-blue-100">SIMPAN KONFIGURASI LOKASI</button>
                </div>
            </div>

            <!-- History Management Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-extrabold text-slate-800">Kelola Riwayat</h3>
                    <button onclick="clearHistory()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100">HAPUS SEMUA DATA</button>
                </div>
                <div id="adminHistoryContainer" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 space-y-6 shadow-2xl scale-95 transition-transform duration-300">
            <div class="text-center space-y-2">
                <h3 class="text-xl font-black text-slate-800">Login Admin</h3>
                <p class="text-sm text-slate-400">Gunakan kata sandi administrator</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="adminPassword" placeholder="Masukkan Kata Sandi" 
                       class="w-full bg-slate-50 px-5 py-4 rounded-2xl border border-slate-100 outline-none focus:border-blue-500 text-center font-bold tracking-widest">
                <button onclick="attemptLogin()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all">VERIFIKASI</button>
                <button onclick="closeLoginModal()" class="w-full py-2 text-slate-400 text-xs font-bold uppercase tracking-widest">BATAL</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-6 right-6 bg-slate-900 text-white p-4 rounded-2xl text-sm font-bold opacity-0 transition-all duration-500 pointer-events-none z-[110] shadow-2xl flex items-center gap-3">
        <div id="toastIconBox" class="w-6 h-6 rounded-lg flex items-center justify-center">
            <svg id="toastIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"></svg>
        </div>
        <span id="toastMsg"></span>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby0COIO_tL_bZ0qyutdQamCCa7ED9i2Tn2uQ3ZL6YImjFgWfLJ6YJWZq0lpF5f40Dc-/exec';
        let currentStream = null;
        let capturedImageData = null;

        // Camera Logic
        async function initCamera() {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                const video = document.getElementById('video');
                video.srcObject = currentStream;
                video.onloadedmetadata = () => video.play();
            } catch (err) {
                showToast("Akses kamera ditolak.", "error");
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const preview = document.getElementById('photoPreview');
            const context = canvas.getContext('2d');
            if (video.readyState !== 4) return;

            const size = Math.min(video.videoWidth, video.videoHeight);
            canvas.width = 640; canvas.height = 640;
            context.save();
            context.translate(640, 0); context.scale(-1, 1);
            context.drawImage(video, (video.videoWidth - size)/2, (video.videoHeight - size)/2, size, size, 0, 0, 640, 640);
            context.restore();

            capturedImageData = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = capturedImageData;
            video.style.display = 'none';
            preview.style.display = 'block';
            document.getElementById('captureContainer').style.display = 'none';
            document.getElementById('retakeBtn').classList.remove('hidden');
        }

        function retakePhoto() {
            capturedImageData = null;
            document.getElementById('video').style.display = 'block';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('captureContainer').style.display = 'flex';
            document.getElementById('retakeBtn').classList.add('hidden');
        }

        // Attendance Logic
        async function submitAbsence() {
            const name = document.getElementById('nameInput').value.trim();
            const status = document.querySelector('input[name="attendanceStatus"]:checked').value;
            if (!name) return showToast("Nama belum diisi!", "error");
            if (!capturedImageData) return showToast("Foto belum diambil!", "error");

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const payload = {
                nama: name,
                tanggal: now.toLocaleDateString('id-ID'),
                jam_masuk: status === 'Masuk' ? timeStr : '-',
                jam_pulang: status === 'Pulang' ? timeStr : '-',
                foto: capturedImageData.split(',')[1]
            };

            const formData = new URLSearchParams();
            for (const key in payload) formData.append(key, payload[key]);

            try {
                await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
                showToast("Presensi berhasil!", "success");
                saveLocal(payload);
                renderHistory();
                resetForm();
            } catch (error) {
                showToast("Selesai diproses.", "success");
                saveLocal(payload);
                renderHistory();
                resetForm();
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }

        // Storage & UI Rendering
        function saveLocal(record) {
            let history = JSON.parse(localStorage.getItem('absensi_history') || '[]');
            history.unshift({ ...record, photoPreview: capturedImageData });
            localStorage.setItem('absensi_history', JSON.stringify(history));
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const adminContainer = document.getElementById('adminHistoryContainer');
            const history = JSON.parse(localStorage.getItem('absensi_history') || '[]');
            
            const emptyTemplate = `<div class="py-8 text-center border-2 border-dashed border-slate-100 rounded-3xl text-[10px] font-black text-slate-300 uppercase">Tidak Ada Data</div>`;

            // Render Public History (Limit 5)
            const publicData = history.slice(0, 5);
            if (publicData.length === 0) {
                container.innerHTML = emptyTemplate;
            } else {
                container.innerHTML = publicData.map(item => createHistoryCard(item, false)).join('');
            }

            // Render Admin History (All)
            if (history.length === 0) {
                adminContainer.innerHTML = emptyTemplate;
            } else {
                adminContainer.innerHTML = history.map((item, idx) => createHistoryCard(item, true, idx)).join('');
            }
        }

        function createHistoryCard(item, isAdmin, index) {
            const isMasuk = item.jam_masuk !== '-';
            return `
            <div class="history-card bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm">
                <img src="${item.photoPreview || 'https://via.placeholder.com/60'}" class="w-14 h-14 rounded-xl object-cover bg-slate-50">
                <div class="flex-grow min-w-0">
                    <div class="flex items-center justify-between">
                        <h4 class="font-bold text-sm text-slate-800 truncate">${item.nama}</h4>
                        <span class="text-[9px] px-2 py-1 rounded-lg font-black ${isMasuk ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-600'}">
                            ${isMasuk ? 'MASUK' : 'PULANG'}
                        </span>
                    </div>
                    <p class="text-[10px] font-semibold text-slate-400 mt-1">${item.tanggal} • ${isMasuk ? item.jam_masuk : item.jam_pulang}</p>
                </div>
                ${isAdmin ? `<button onclick="deleteSingleRecord(${index})" class="p-2 text-red-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg></button>` : ''}
            </div>`;
        }

        // Admin Auth
        function openLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('loginModal').children[0].classList.remove('scale-95'), 10);
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }

        function attemptLogin() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'admin123') {
                showToast("Login Admin Berhasil", "success");
                closeLoginModal();
                showAdminDashboard();
            } else {
                showToast("Kata Sandi Salah!", "error");
            }
        }

        function showAdminDashboard() {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('adminView').classList.remove('hidden');
            window.scrollTo(0, 0);
            renderHistory();
        }

        function closeAdmin() {
            document.getElementById('adminView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // Admin Controls
        function deleteSingleRecord(index) {
            let history = JSON.parse(localStorage.getItem('absensi_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('absensi_history', JSON.stringify(history));
            renderHistory();
            showToast("Data dihapus", "success");
        }

        function clearHistory() {
            if (confirm("Hapus semua riwayat presensi?")) {
                localStorage.removeItem('absensi_history');
                renderHistory();
                showToast("Semua riwayat dibersihkan", "success");
            }
        }

        function saveMapConfig() {
            const config = {
                lat: document.getElementById('latInput').value,
                lng: document.getElementById('lngInput').value,
                radius: document.getElementById('radiusInput').value
            };
            localStorage.setItem('map_config', JSON.stringify(config));
            showToast("Konfigurasi Map Disimpan", "success");
        }

        function resetForm() {
            document.getElementById('nameInput').value = '';
            retakePhoto();
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            const iconBox = document.getElementById('toastIconBox');
            const icon = document.getElementById('toastIcon');
            msgEl.innerText = msg;
            
            if (type === "success") {
                iconBox.className = "w-6 h-6 bg-blue-500 rounded-lg flex items-center justify-center";
                icon.innerHTML = '<path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />';
            } else {
                iconBox.className = "w-6 h-6 bg-red-500 rounded-lg flex items-center justify-center";
                icon.innerHTML = '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />';
            }
            
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(0)';
            }, 3000);
        }

        window.onload = () => {
            initCamera();
            renderHistory();
            const savedMap = localStorage.getItem('map_config');
            if (savedMap) {
                const config = JSON.parse(savedMap);
                document.getElementById('latInput').value = config.lat;
                document.getElementById('lngInput').value = config.lng;
                document.getElementById('radiusInput').value = config.radius;
            }
        };
    </script>
</body>
</html>
